server {
    listen 80;

    # Serve CSS, JS, and other static assets directly from Nginx
    # No long-term caching for JS/CSS so deploys take effect immediately
    location ~* \.(?:js|css)$ {
        root /usr/share/nginx/html;
        expires -1;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
    }

    location /static/ {
        root /usr/share/nginx/html;
        expires 1d;
        add_header Cache-Control "public, max-age=86400";
    }

    # Proxy everything else (HTML pages, API calls) to the Flask backend
    location / {
        # proxy_pass http://localhost:5000; # Setup in cloud run
        proxy_pass http://backend:5000; # Setup in docker-compose.yml
        proxy_http_version 1.1;

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Required for Server-Sent Events (streaming scrape progress)
        proxy_buffering    off;
        proxy_cache        off;
        proxy_read_timeout 600s;
    }
}
